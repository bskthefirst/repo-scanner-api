app = 'repo-scanner-api'
primary_region = 'iad'

[build]
  builder = 'heroku/buildpacks:20'

[env]
  PORT = '8080'
  PAYPAL_ME = 'bsknap'

[[services]]
  internal_port = 8080
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['http', 'tls']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'